name: Release materials

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source materials repo (in this course org)"
        required: true
        type: choice
        options:
          - materials-f2026
      cohort_org:
        description: "Target cohort org"
        required: true
        type: choice
        options:
          - THROWAWAY-HERTIE-F2026
      cohort_repo:
        description: "Target repo in the cohort org"
        required: true
        type: choice
        options:
          - materials
      session:
        description: "Session number (e.g. 1)"
        required: true
      exclude:
        description: "Space/comma-separated sections to skip (e.g. readings) - the source repo is only known once you run this, so there are no per-section toggles here"
        required: false
      include_syllabus:
        description: "Also release the syllabus (root *syllabus* files) - overwrites"
        type: boolean
        default: false
      include_readme:
        description: "Also release the source README to the cohort root - overwrites"
        type: boolean
        default: false

jobs:
  check-team:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Verify the user may run actions for THIS repo
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          # Faculty have write+ on the course repos; students never do (and triggering a
          # workflow_dispatch already requires write), so repo permission is the gate.
          perm=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission' 2>/tmp/gherr || true)
          case "$perm" in admin|write|maintain) exit 0 ;; esac
          echo "::error::@$ACTOR lacks write on $REPO (permission='$perm'). gh api said:"
          cat /tmp/gherr || true
          exit 1

  release:
    needs: check-team
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hertie-data-science-lab/dsl-teaching-course-setup
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          SRC_ORG: ${{ github.repository_owner }}
          SRC_REPO: ${{ inputs.source_repo }}
          COHORT_ORG: ${{ inputs.cohort_org }}
          COHORT_REPO: ${{ inputs.cohort_repo }}
          SESSION: ${{ inputs.session }}
          INC_SYL: ${{ inputs.include_syllabus }}
          INC_RM: ${{ inputs.include_readme }}
          EXCLUDE_INPUT: ${{ inputs.exclude }}
        run: |
          gh auth setup-git
          exclude=""
          exclude="$EXCLUDE_INPUT"
          args=(--source-org "$SRC_ORG" --source-repo "$SRC_REPO"
                --cohort-org "$COHORT_ORG" --cohort-repo "$COHORT_REPO"
                --session "$SESSION" --exclude "$exclude")
          [ "$INC_SYL" = "true" ] && args+=(--syllabus)
          [ "$INC_RM" = "true" ] && args+=(--readme)
          python3 -m dsl_course.release "${args[@]}"
